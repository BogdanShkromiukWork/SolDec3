name: deploy web app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
   id-token: write
   contents: read
   pages: write 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install
        working-directory: .

      - run: npm run build
        working-directory: .

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - uses: actions/deploy-pages@v4